# Render Blueprint — backend API (Node).
# New: Dashboard → Blueprints → New Blueprint Instance → connect this repo.
# Existing web service: set CORS_ORIGIN in Environment to match your Vercel URL
# (comma-separated for multiple origins, e.g. http://localhost:5173,https://....vercel.app).

services:
  - type: web
    name: evoltsoft-assignment
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: https://frontend-two-neon-24.vercel.app
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
